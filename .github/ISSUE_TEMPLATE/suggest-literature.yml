name: Suggest literature
description: Suggest a paper, book, or other resource to add to the reading list.
title: "Suggest: "
labels: ["suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Fusion CDT Community Reading List!
        Please fill in as much detail as you can below.

  - type: input
    id: doi
    attributes:
      label: DOI
      description: The DOI of the paper or resource, if available.
      placeholder: "e.g. 10.1063/1.2178779"
    validations:
      required: false

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "e.g. Zonal flows in plasma — a review"
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Authors
      placeholder: "e.g. Itoh et al."
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which section of the reading list does this belong to?
      options:
        - Plasma / MCF
        - Plasma / ICF
        - Plasma / LTP
        - Materials
        - Other / unsure
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags (e.g. existing tags like `gyrokinetics`, `zonal-flows`, or suggest new ones).
      placeholder: "e.g. gyrokinetics, GS2"
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Why should this be included?
      description: A brief note on why this is useful for CDT students.
      placeholder: "e.g. Essential review paper for anyone starting in gyrokinetics."
    validations:
      required: true
